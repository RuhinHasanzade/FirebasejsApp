<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #333;
            color: #fff;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 1rem;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .card {
            padding: 1rem;
        }
        .user-box {
            font-size: 1.2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        button {
            padding: 0.5rem 1rem;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

       .post {
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .post-user {
            font-weight: bold;
        }

        .post-date {
            font-size: 12px;
            color: #777;
        }

        .post-text {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty {
            color: #777;
            font-style: italic;
        }
         
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            My App
        </div>
        <div class="user-box">
            Xos geldin, <span id="username">Loading....</span>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h1>Home Page</h1>
            <p>Burda istifadechinin adi yuxarida gorunecek.</p>
            <button id="logout">Logout</button>
        </div>

        <div class="card">
            <h2>Blog Yaz</h2>
            <textarea id="postInput" placeholder="Ne dusunursen??"></textarea>
            <br><br>
            <button id="sharePost">Paylaş</button>
        </div>

        <div class="card">
            <h2>Bloglar</h2>
            <div id="posts">
                <p class="empty">Hele post yoxdur .....</p>
            </div>
        </div>
    </div>

    <script type="module" src="./home.js"></script>
</body>
</html>
